groups:

  - name: parapet_slo_http
    rules:

      - record: slo:error_ratio:rate5m
        expr: >
          1 - (
            sum(rate(parapet_http_server_duration_milliseconds_count{status_code=~"2..|3.."}[5m]))
            /
            sum(rate(parapet_http_server_duration_milliseconds_count[5m]))
          )
        labels:
          slo: http

      - record: slo:error_ratio:rate30m
        expr: >
          1 - (
            sum(rate(parapet_http_server_duration_milliseconds_count{status_code=~"2..|3.."}[30m]))
            /
            sum(rate(parapet_http_server_duration_milliseconds_count[30m]))
          )
        labels:
          slo: http

      - record: slo:error_ratio:rate1h
        expr: >
          1 - (
            sum(rate(parapet_http_server_duration_milliseconds_count{status_code=~"2..|3.."}[1h]))
            /
            sum(rate(parapet_http_server_duration_milliseconds_count[1h]))
          )
        labels:
          slo: http

      - record: slo:error_ratio:rate2h
        expr: >
          1 - (
            sum(rate(parapet_http_server_duration_milliseconds_count{status_code=~"2..|3.."}[2h]))
            /
            sum(rate(parapet_http_server_duration_milliseconds_count[2h]))
          )
        labels:
          slo: http

      - record: slo:error_ratio:rate6h
        expr: >
          1 - (
            sum(rate(parapet_http_server_duration_milliseconds_count{status_code=~"2..|3.."}[6h]))
            /
            sum(rate(parapet_http_server_duration_milliseconds_count[6h]))
          )
        labels:
          slo: http

      - record: slo:error_ratio:rate3d
        expr: >
          1 - (
            sum(rate(parapet_http_server_duration_milliseconds_count{status_code=~"2..|3.."}[3d]))
            /
            sum(rate(parapet_http_server_duration_milliseconds_count[3d]))
          )
        labels:
          slo: http


      # Alert: Page for rapid burn (14.4x over 1h/5m)
      - alert: HttpSLOBurnRatePage
        expr: >
          slo:error_ratio:rate1h{slo="http"} > (9.999999999998899e-4 * 14.4)
          and
          slo:error_ratio:rate5m{slo="http"} > (9.999999999998899e-4 * 14.4)
        labels:
          severity: page
          slo: http
        annotations:
          summary: "High SLO burn rate for http"
          runbook: "https://example.com/runbooks/http-slo"

      # Alert: Ticket for medium burn (6x over 6h/30m)
      - alert: HttpSLOBurnRateTicket
        expr: >
          slo:error_ratio:rate6h{slo="http"} > (9.999999999998899e-4 * 6)
          and
          slo:error_ratio:rate30m{slo="http"} > (9.999999999998899e-4 * 6)
        labels:
          severity: ticket
          slo: http
        annotations:
          summary: "Medium SLO burn rate for http"
          runbook: "https://example.com/runbooks/http-slo"

      # Alert: Warning for slow burn (1x over 3d/6h)
      - alert: HttpSLOBurnRateWarning
        expr: >
          slo:error_ratio:rate3d{slo="http"} > (9.999999999998899e-4 * 1)
          and
          slo:error_ratio:rate6h{slo="http"} > (9.999999999998899e-4 * 1)
        labels:
          severity: warning
          slo: http
        annotations:
          summary: "Slow SLO burn rate for http"
          runbook: "https://example.com/runbooks/http-slo"

