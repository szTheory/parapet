name: release-please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      version: ${{ steps.release.outputs.version }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      sha: ${{ steps.release.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-hex:
    runs-on: ubuntu-latest
    needs: [release-please]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    env:
      HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.release-please.outputs.sha }}

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.19.0'
          otp-version: '27.2'

      - name: Install dependencies
        run: mix deps.get

      - name: Publish dry run
        run: mix hex.publish --dry-run

      - name: Publish package
        run: mix hex.publish --yes

      - name: Verify Hex package release
        run: mix hex.info parapet "${{ needs.release-please.outputs.version }}"

      - name: Verify HexDocs release
        run: |
          mix hex.docs fetch parapet "${{ needs.release-please.outputs.version }}"
          for attempt in 1 2 3 4 5; do
            if curl --fail --silent --show-error --location \
              "https://hexdocs.pm/parapet/${{ needs.release-please.outputs.version }}/"; then
              exit 0
            fi

            if [ "$attempt" -lt 5 ]; then
              sleep 15
            fi
          done

          exit 1
