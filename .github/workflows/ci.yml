name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test
    steps:
      - uses: actions/checkout@v4
      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.19.0'
          otp-version: '27.2'
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-
      - name: Cache _build
        uses: actions/cache@v4
        with:
          path: _build
          key: ${{ runner.os }}-build-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-build-
      - name: Install dependencies
        run: mix deps.get
      - name: Check Formatting
        run: mix format --check-formatted
      - name: Compile Warnings as Errors
        run: mix compile --warnings-as-errors
      - name: Compile Without Optional Deps
        run: mix compile --no-optional-deps --warnings-as-errors
      - name: Build Docs Warnings as Errors
        env:
          MIX_ENV: dev
        run: mix docs --warnings-as-errors
      - name: Credo
        run: mix credo --strict
      - name: Dialyzer
        run: mix dialyzer
      - name: Verify Public API
        run: mix verify.public_api

  test:
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: parapet_concurrency_test
        ports:
          - '5432:5432'
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.19.0'
          otp-version: '27.2'
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-
      - name: Cache _build
        uses: actions/cache@v4
        with:
          path: _build
          key: ${{ runner.os }}-build-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-build-
      - name: Install dependencies
        run: mix deps.get
      - name: Test
        run: mix test

  demo:
    runs-on: ubuntu-latest
    needs: [lint, test]
    env:
      MIX_ENV: test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: demo_app_test
        ports:
          - '5432:5432'
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.19.0'
          otp-version: '27.2'
      - name: Cache demo dependencies
        uses: actions/cache@v4
        with:
          path: examples/demo_app/deps
          key: ${{ runner.os }}-demo-mix-${{ hashFiles('examples/demo_app/mix.lock') }}
          restore-keys: ${{ runner.os }}-demo-mix-
      - name: Cache demo _build
        uses: actions/cache@v4
        with:
          path: examples/demo_app/_build
          key: ${{ runner.os }}-demo-build-${{ hashFiles('examples/demo_app/mix.lock') }}
          restore-keys: ${{ runner.os }}-demo-build-
      - name: Install demo dependencies
        run: cd examples/demo_app && mix deps.get
      - name: Create and migrate demo database
        run: cd examples/demo_app && mix ecto.create && mix ecto.migrate
      - name: Seed demo database
        run: cd examples/demo_app && mix run priv/repo/seeds.exs
      - name: Run smoke test
        run: cd examples/demo_app && mix test --only smoke

  release_gate:
    needs: [lint, test, demo]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All required CI checks passed"
